<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de DTs</title>
  <style>
    :root{
      --bg:#08111f;
      --panel:#0f172a;
      --panel-2:#111827;
      --line:rgba(255,255,255,.10);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --green:#22c55e;
      --yellow:#f59e0b;
      --red:#ef4444;
      --blue:#3b82f6;
      --shadow:0 18px 40px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      background:linear-gradient(180deg,#07101c 0%, #0b1323 100%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:1380px;margin:0 auto;padding:18px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px;
    }
    .brand{
      display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:999px;
      background:rgba(255,255,255,.04);border:1px solid var(--line);font-weight:800;
    }
    .brand-dot{width:10px;height:10px;border-radius:999px;background:var(--green);box-shadow:0 0 12px rgba(34,197,94,.55)}
    .tabs{display:flex;gap:10px;flex-wrap:wrap}
    .tab{
      border:none;cursor:pointer;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--line);
      padding:12px 16px;border-radius:14px;font-weight:800;font-size:14px;
    }
    .tab.active{background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(59,130,246,.10));border-color:rgba(34,197,94,.28)}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}
    .card{
      background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    }
    .stat{padding:16px}
    .stat .label{font-size:13px;color:var(--muted);margin-bottom:10px}
    .stat .value{font-size:32px;font-weight:900;line-height:1}
    .green{color:var(--green)} .yellow{color:var(--yellow)} .red{color:var(--red)} .blue{color:#60a5fa}
    .screen{display:none}
    .screen.active{display:block}
    .layout{display:grid;grid-template-columns:360px 1fr;gap:16px}
    .panel{padding:16px}
    .title-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
    .title-row h2{margin:0;font-size:20px}
    .title-row .hint{font-size:12px;color:var(--muted)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
    input, select, textarea{
      width:100%;padding:12px 13px;border-radius:13px;border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);color:var(--text);outline:none;font-size:14px;
    }
    textarea{min-height:100px;resize:vertical}
    input:focus, select:focus, textarea:focus{border-color:rgba(59,130,246,.45);box-shadow:0 0 0 3px rgba(59,130,246,.14)}
    .row-2,.row-3{display:grid;gap:12px}
    .row-2{grid-template-columns:1fr 1fr}
    .row-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button.btn{
      border:none;cursor:pointer;padding:12px 14px;border-radius:13px;font-weight:800;color:white;
    }
    .btn.green{background:#16a34a}.btn.blue{background:#2563eb}.btn.yellow{background:#d97706}.btn.red{background:#dc2626}.btn.gray{background:#334155}
    .btn.ghost{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text)}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .toolbar .mini{padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);font-weight:700;cursor:pointer}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;text-align:left;vertical-align:top}
    th{position:sticky;top:0;background:#0b1220;color:#cbd5e1;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid transparent}
    .status-disponivel{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.22)}
    .status-reservada{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.22)}
    .status-usada{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.22)}
    .status-cancelada{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.22)}
    .status-aberto{background:rgba(59,130,246,.12);color:#bfdbfe;border-color:rgba(59,130,246,.22)}
    .status-concluido{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.22)}
    .status-finalizado{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.22)}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}
    .row-actions button{border:none;cursor:pointer;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:800;color:white}
    .row-actions .a1{background:#334155}.row-actions .a2{background:#2563eb}.row-actions .a3{background:#dc2626}.row-actions .a4{background:#16a34a}
    .section-gap{margin-top:16px}
    .empty{padding:28px;text-align:center;color:var(--muted)}
    .sticky{position:sticky;top:10px}
    .footer-note{margin-top:10px;font-size:12px;color:var(--muted)}
    details.status-menu{position:relative}
    details.status-menu summary{
      list-style:none;
      cursor:pointer;
      padding:8px 10px;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:12px;
      font-weight:800;
      user-select:none;
      border:none;
      min-width:72px;
      text-align:center;
    }
    details.status-menu summary::-webkit-details-marker{display:none}
    .status-pop{
      position:absolute;
      top:40px;
      right:0;
      z-index:5;
      min-width:150px;
      padding:8px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0b1220;
      box-shadow:var(--shadow);
      display:grid;
      gap:8px;
    }
    .status-pop button{
      width:100%;
      border:none;
      cursor:pointer;
      padding:9px 10px;
      border-radius:10px;
      font-size:12px;
      font-weight:800;
      color:#fff;
    }
    .status-pop .ok{background:#16a34a}
    .status-pop .cancel{background:#dc2626}
    .pill-note{display:inline-flex;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:12px;color:var(--muted)}
    .sync-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px;font-weight:800;color:#cbd5e1}
    .sync-dot{width:9px;height:9px;border-radius:999px;background:#64748b}
    .sync-badge.ok .sync-dot{background:var(--green);box-shadow:0 0 10px rgba(34,197,94,.45)}
    .sync-badge.warn .sync-dot{background:var(--yellow);box-shadow:0 0 10px rgba(245,158,11,.45)}
    .sync-badge.err .sync-dot{background:var(--red);box-shadow:0 0 10px rgba(239,68,68,.45)}
    @media (max-width:1100px){.stats,.layout{grid-template-columns:1fr}.sticky{position:static}}
    @media (max-width:760px){.wrap{padding:14px}.row-2,.row-3,.actions{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.tab{flex:1}.toolbar .mini,.actions .btn{width:100%}}
    @media (max-width:520px){.stats{grid-template-columns:1fr}.brand{width:100%;justify-content:center}.tabs{width:100%}.tab{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><span class="brand-dot"></span><span>Controle de DTs</span></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="sync-badge warn" id="syncBadge"><span class="sync-dot"></span><span id="syncText">Conectando</span></div>
        <div class="tabs">
          <button class="tab active" data-tab="cadastro">Cadastro</button>
          <button class="tab" data-tab="registro">Registro</button>
        </div>
      </div>
    </div>

    <section class="stats" id="stats"></section>

    <section class="screen active" id="screen-cadastro">
      <div class="layout">
        <aside class="sticky">
          <div class="card panel">
            <div class="title-row"><h2>Cadastrar DTs</h2><span class="hint">rápido</span></div>
            <div class="field">
              <label for="singleDt">Uma DT</label>
              <input id="singleDt" type="text" placeholder="Ex.: 123456789" />
            </div>
            <div class="field">
              <label for="singleSku">SKU</label>
              <input id="singleSku" type="text" placeholder="Ex.: SKU 123 / Produto X" />
            </div>
            <div class="actions">
              <button class="btn green" id="addSingleDtBtn">Adicionar</button>
              <button class="btn ghost" id="clearSingleDtBtn">Limpar</button>
            </div>

            <div class="section-gap"></div>
            <div class="field">
              <label for="bulkDts">Em lote</label>
              <textarea id="bulkDts" placeholder="Cole uma DT por linha, vírgula ou espaço"></textarea>
            </div>
            <div class="field">
              <label for="bulkSku">SKU do lote</label>
              <input id="bulkSku" type="text" placeholder="Mesmo SKU para todas as DTs do lote" />
            </div>
            <div class="actions">
              <button class="btn blue" id="addBulkDtBtn">Adicionar lote</button>
              <button class="btn ghost" id="clearBulkBtn">Limpar</button>
            </div>

            <div class="section-gap"></div>
            <div class="actions">
              <button class="btn ghost" id="exportDtCsvBtn">DTs CSV</button>
              <button class="btn ghost" id="backupJsonBtn">Backup JSON</button>
              <button class="btn ghost" id="restoreJsonBtn">Restaurar JSON</button>
              <button class="btn ghost" id="exportHistoryCsvBtn">Histórico CSV</button>
              <input id="restoreJsonInput" type="file" accept="application/json" hidden />
            </div>
            <div class="footer-note">Base compartilhada no Firebase.</div>
          </div>
        </aside>

        <main>
          <div class="card panel">
            <div class="title-row"><h2>Fila</h2><span class="hint">controle</span></div>
            <div class="row-3">
              <div class="field">
                <label for="searchDt">Buscar</label>
                <input id="searchDt" type="text" placeholder="DT ou SKU" />
              </div>
              <div class="field">
                <label for="statusFilter">Status</label>
                <select id="statusFilter">
                  <option value="todos">Todos</option>
                  <option value="disponivel">Disponível</option>
                  <option value="reservada">Reservada</option>
                  <option value="usada">Registrada</option>
                  <option value="cancelada">Cancelada</option>
                </select>
              </div>
              <div class="field">
                <label for="sortMode">Ordem</label>
                <select id="sortMode">
                  <option value="recentes">Mais recentes</option>
                  <option value="antigas">Mais antigas</option>
                  <option value="dt_asc">DT crescente</option>
                  <option value="dt_desc">DT decrescente</option>
                </select>
              </div>
            </div>
            <div class="toolbar">
              <button class="mini" id="clearUsedBtn">Excluir registradas</button>
              <button class="mini" id="clearCancelledBtn">Excluir canceladas</button>
              <button class="mini" id="clearAllBtn">Limpar tudo</button>
            </div>
            <div class="table-wrap" id="dtTableWrap"></div>
          </div>
        </main>
      </div>
    </section>

    <section class="screen" id="screen-registro">
      <div class="layout">
        <aside class="sticky">
          <div class="card panel">
            <div class="title-row"><h2>Registrar</h2><span class="hint">baldeio</span></div>

            <div class="field">
              <label for="dtMode">Usar DT</label>
              <select id="dtMode">
                <option value="auto">Próxima disponível</option>
                <option value="manual">Escolher específica</option>
              </select>
            </div>
            <div class="row-2" id="manualFilterWrap" style="display:none">
              <div class="field">
                <label for="manualSelectMode">Escolher específica</label>
                <select id="manualSelectMode">
                  <option value="all">Todas disponíveis</option>
                  <option value="sku">Por SKU</option>
                </select>
              </div>
              <div class="field" id="manualSkuField" style="display:none">
                <label for="manualSkuSelect">SKU</label>
                <select id="manualSkuSelect"></select>
              </div>
            </div>
            <div class="field" id="manualDtField" style="display:none">
              <label for="manualDtSelect">DT específica</label>
              <select id="manualDtSelect"></select>
            </div>

            <div class="row-2">
              <div class="field">
                <label for="motorista">Motorista</label>
                <input id="motorista" type="text" placeholder="Nome" />
              </div>
              <div class="field">
                <label for="transportadora">Transportadora</label>
                <input id="transportadora" type="text" placeholder="Transportadora" />
              </div>
            </div>

            <div class="row-2">
              <div class="field">
                <label for="placaCavalo">Placa cavalo</label>
                <input id="placaCavalo" type="text" placeholder="ABC1D23" maxlength="8" />
              </div>
              <div class="field">
                <label for="placaCarreta">Placa carreta</label>
                <input id="placaCarreta" type="text" placeholder="ABC1D23" maxlength="8" />
              </div>
            </div>

            <div class="row-2">
              <div class="field">
                <label for="origem">Origem</label>
                <input id="origem" type="text" placeholder="Fábrica" />
              </div>
              <div class="field">
                <label for="destino">Destino</label>
                <input id="destino" type="text" placeholder="Armazém externo" />
              </div>
            </div>

            <div class="field">
              <label for="observacao">Observação</label>
              <textarea id="observacao" placeholder="Informações adicionais"></textarea>
            </div>

            <div class="actions">
              <button class="btn green" id="registerBaldeioBtn">Registrar</button>
              <button class="btn yellow" id="reserveNextBtn">Reservar</button>
            </div>
          </div>
        </aside>

        <main>
          <div class="card panel">
            <div class="title-row"><h2>Histórico</h2><span class="hint">operações</span></div>
            <div class="row-3">
              <div class="field">
                <label for="historySearch">Buscar</label>
                <input id="historySearch" type="text" placeholder="DT, motorista, placa ou transportadora" />
              </div>
              <div class="field">
                <label for="historyFlowFilter">Situação</label>
                <select id="historyFlowFilter">
                  <option value="todos">Todos</option>
                  <option value="aberto">Em aberto</option>
                  <option value="concluido">Concluído</option>
                  <option value="cancelado">Cancelado</option>
                </select>
              </div>
              <div class="field">
                <label for="historySort">Ordem</label>
                <select id="historySort">
                  <option value="recentes">Mais recentes</option>
                  <option value="antigas">Mais antigas</option>
                </select>
              </div>
            </div>
            <div class="toolbar">
              <button class="mini" id="clearHistoryBtn">Limpar histórico</button>
            </div>
            <div class="table-wrap" id="historyTableWrap"></div>
          </div>
        </main>
      </div>
    </section>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import {
    getFirestore,
    collection,
    doc,
    setDoc,
    updateDoc,
    deleteDoc,
    getDoc,
    onSnapshot,
    writeBatch,
    runTransaction
  } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD7TvN58S0Z4CkMY6G0aRixvYk_xfYul20",
    authDomain: "controle-11baa.firebaseapp.com",
    projectId: "controle-11baa",
    storageBucket: "controle-11baa.firebasestorage.app",
    messagingSenderId: "351836968592",
    appId: "1:351836968592:web:8af1d88483cf4ecf47aa15",
    measurementId: "G-NFC2BWN7WN"
  };

  const initialState = { dts: [], history: [] };
  let state = structuredClone(initialState);
  let app, auth, db;
  let unsubDts = null;
  let unsubHistory = null;
  let isDtsLoaded = false;
  let isHistoryLoaded = false;

  const el = (id) => document.getElementById(id);
  const qsa = (sel) => [...document.querySelectorAll(sel)];

  function uid(prefix='id'){
    return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  }
  function nowIso(){ return new Date().toISOString(); }
  function normalizeDt(v){ return String(v || '').replace(/\D/g,''); }
  function normalizePlate(v){ return String(v || '').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,7); }
  function asDate(v){
    if(!v) return null;
    if(v instanceof Date) return v;
    if(typeof v?.toDate === 'function') return v.toDate();
    const d = new Date(v);
    return Number.isNaN(d.getTime()) ? null : d;
  }
  function fmtDate(v){
    const d = asDate(v);
    return d ? d.toLocaleString('pt-BR') : '-';
  }
  function downloadFile(name, content, type='text/plain;charset=utf-8'){
    const blob = new Blob([content], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  }
  function csvEscape(v){
    const s = String(v ?? '');
    if(/[";,\n]/.test(s)) return '"' + s.replaceAll('"','""') + '"';
    return s;
  }
  function inferFlowStatus(item){
    if(item.flowStatus) return item.flowStatus;
    return 'aberto';
  }
  function toast(msg){ alert(msg); }
  function setSyncBadge(kind, text){
    const badge = el('syncBadge');
    const textEl = el('syncText');
    badge.classList.remove('ok','warn','err');
    badge.classList.add(kind);
    textEl.textContent = text;
  }
  function sortDts(list, sortMode){
    return [...list].sort((a,b)=>{
      const aCreated = asDate(a.createdAt)?.getTime() || 0;
      const bCreated = asDate(b.createdAt)?.getTime() || 0;
      if(sortMode==='recentes') return bCreated - aCreated;
      if(sortMode==='antigas') return aCreated - bCreated;
      if(sortMode==='dt_asc') return a.dt.localeCompare(b.dt);
      return b.dt.localeCompare(a.dt);
    });
  }
  function sortHistory(list, sort='recentes'){
    return [...list].sort((a,b)=>{
      const aCreated = asDate(a.createdAt)?.getTime() || 0;
      const bCreated = asDate(b.createdAt)?.getTime() || 0;
      return sort==='recentes' ? bCreated - aCreated : aCreated - bCreated;
    });
  }
  function getStats(){
    return {
      total: state.dts.length,
      disponivel: state.dts.filter(d=>d.status==='disponivel').length,
      reservada: state.dts.filter(d=>d.status==='reservada').length,
      concluidasHoje: state.history.filter(h => h.flowStatus==='concluido' && sameDay(asDate(h.updatedAt || h.createdAt), new Date())).length,
    };
  }
  function sameDay(a,b){
    if(!a || !b) return false;
    return a.getDate()===b.getDate() && a.getMonth()===b.getMonth() && a.getFullYear()===b.getFullYear();
  }
  function getAvailableDts(){ return state.dts.filter(d=>d.status==='disponivel'); }
  function nextAvailableDt(){
    return [...getAvailableDts()].sort((a,b)=> (asDate(a.createdAt)?.getTime() || 0) - (asDate(b.createdAt)?.getTime() || 0))[0] || null;
  }
  function getAvailableSkus(){
    return [...new Set(getAvailableDts().map(d => String(d.sku || '').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  }
  function renderStats(){
    const s = getStats();
    el('stats').innerHTML = `
      <div class="card stat"><div class="label">Total</div><div class="value">${s.total}</div></div>
      <div class="card stat"><div class="label">Disponíveis</div><div class="value green">${s.disponivel}</div></div>
      <div class="card stat"><div class="label">Reservadas</div><div class="value yellow">${s.reservada}</div></div>
      <div class="card stat"><div class="label">Concluídas hoje</div><div class="value blue">${s.concluidasHoje}</div></div>`;
  }
  function manualDtOptions(){
    const manualMode = el('dtMode').value === 'manual';
    el('manualFilterWrap').style.display = manualMode ? 'grid' : 'none';
    el('manualDtField').style.display = manualMode ? 'block' : 'none';
    if(!manualMode){
      el('manualSkuField').style.display = 'none';
      return;
    }

    const skuMode = el('manualSelectMode').value === 'sku';
    const skus = getAvailableSkus();
    el('manualSkuField').style.display = skuMode ? 'block' : 'none';
    el('manualSkuSelect').innerHTML = skus.length
      ? '<option value="">Selecione o SKU</option>' + skus.map(sku => `<option value="${escapeHtml(sku)}">${escapeHtml(sku)}</option>`).join('')
      : '<option value="">Sem SKU disponível</option>';

    const selectedSku = el('manualSkuSelect').value;
    let opts = getAvailableDts();
    if(skuMode){
      opts = selectedSku ? opts.filter(d => String(d.sku || '').trim() === selectedSku) : [];
    }
    opts = opts.sort((a,b)=> a.dt.localeCompare(b.dt));
    el('manualDtSelect').innerHTML = opts.length
      ? opts.map(d=>`<option value="${d.dt}">${d.dt}${d.sku ? ' • ' + escapeHtml(d.sku) : ''}</option>`).join('')
      : `<option value="">${skuMode ? 'Nenhuma DT disponível para esse SKU' : 'Sem DT disponível'}</option>`;
  }
  function labelDtStatus(status){
    const map = {
      disponivel: 'Disponível',
      reservada: 'Reservada',
      usada: 'Registrada',
      cancelada: 'Cancelada'
    };
    return map[status] || status;
  }
  function labelType(type){
    return type === 'registrado' ? 'Registrado' : 'Reservado';
  }
  function labelFlowStatus(status){
    const map = { aberto: 'Em aberto', concluido: 'Concluído', cancelado: 'Cancelado' };
    return map[status] || status;
  }
  function escapeHtml(text){
    return String(text ?? '')
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#39;");
  }
  function renderDtTable(){
    const searchRaw = String(el('searchDt').value || '').trim().toLowerCase();
    const searchDt = normalizeDt(searchRaw);
    const status = el('statusFilter').value;
    const sortMode = el('sortMode').value;
    let rows = [...state.dts];
    if(searchRaw){
      rows = rows.filter(r =>
        (searchDt && r.dt.includes(searchDt)) ||
        String(r.sku || '').toLowerCase().includes(searchRaw)
      );
    }
    if(status !== 'todos') rows = rows.filter(r=>r.status===status);
    rows = sortDts(rows, sortMode);
    if(!rows.length){
      el('dtTableWrap').innerHTML = '<div class="empty">Nenhuma DT encontrada.</div>';
      return;
    }
    el('dtTableWrap').innerHTML = `
      <table>
        <thead>
          <tr><th>DT</th><th>SKU</th><th>Status</th><th>Criada</th><th>Atualizada</th><th>Ações</th></tr>
        </thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td><strong>${escapeHtml(r.dt)}</strong></td>
              <td>${escapeHtml(r.sku || '-')}</td>
              <td><span class="badge status-${escapeHtml(r.status)}">${labelDtStatus(r.status)}</span></td>
              <td>${fmtDate(r.createdAt)}</td>
              <td>${fmtDate(r.updatedAt)}</td>
              <td>
                <div class="row-actions">
                  ${r.status!=='disponivel' ? `<button class="a4" onclick="window.setStatus('${escapeHtml(r.dt)}','disponivel')">Disponível</button>` : ''}
                  ${r.status!=='reservada' ? `<button class="a2" onclick="window.setStatus('${escapeHtml(r.dt)}','reservada')">Reservar</button>` : ''}
                  ${r.status!=='cancelada' ? `<button class="a1" onclick="window.setStatus('${escapeHtml(r.dt)}','cancelada')">Cancelar</button>` : ''}
                  <button class="a3" onclick="window.deleteDt('${escapeHtml(r.dt)}')">Excluir</button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }
  function renderHistory(){
    const search = String(el('historySearch').value || '').toLowerCase().trim();
    const flowFilter = el('historyFlowFilter').value;
    const sort = el('historySort').value;
    let rows = [...state.history];
    if(search){
      rows = rows.filter(r => [
        r.dt,r.sku,r.motorista,r.transportadora,r.placaCavalo,r.placaCarreta,r.origem,r.destino,r.observacao,labelType(r.type),labelFlowStatus(r.flowStatus)
      ].join(' ').toLowerCase().includes(search));
    }
    if(flowFilter !== 'todos') rows = rows.filter(r => r.flowStatus===flowFilter);
    rows = sortHistory(rows, sort);
    if(!rows.length){
      el('historyTableWrap').innerHTML = '<div class="empty">Nenhum registro ainda.</div>';
      return;
    }
    el('historyTableWrap').innerHTML = `
      <table>
        <thead>
          <tr><th>Tipo</th><th>Status</th><th>DT</th><th>SKU</th><th>Motorista</th><th>Transportadora</th><th>Placas</th><th>Origem / Destino</th><th>Observação</th><th>Data</th><th>Ações</th></tr>
        </thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td><span class="badge status-${r.type==='registrado' ? 'usada' : 'reservada'}">${labelType(r.type)}</span></td>
              <td><span class="badge status-${escapeHtml(r.flowStatus)}">${labelFlowStatus(r.flowStatus)}</span></td>
              <td><strong>${escapeHtml(r.dt)}</strong></td>
              <td>${escapeHtml(r.sku || '-')}</td>
              <td>${escapeHtml(r.motorista || '-')}</td>
              <td>${escapeHtml(r.transportadora || '-')}</td>
              <td>${escapeHtml([r.placaCavalo || '-', r.placaCarreta || '-'].join(' / '))}</td>
              <td>${escapeHtml([r.origem || '-', r.destino || '-'].join(' → '))}</td>
              <td>${escapeHtml(r.observacao || '-')}</td>
              <td>${fmtDate(r.createdAt)}</td>
              <td>
                <div class="row-actions">
                  ${r.flowStatus === 'aberto' ? `
                    <details class="status-menu">
                      <summary>Status</summary>
                      <div class="status-pop">
                        <button class="ok" onclick="window.setHistoryFlowStatus('${escapeHtml(r.id)}','concluido')">Concluído</button>
                        <button class="cancel" onclick="window.setHistoryFlowStatus('${escapeHtml(r.id)}','cancelado')">Cancelado</button>
                      </div>
                    </details>` : `<span class="pill-note">${labelFlowStatus(r.flowStatus)}</span>`}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }
  function renderAll(){
    renderStats();
    renderDtTable();
    renderHistory();
    manualDtOptions();
  }
  function clearRegisterFields(){
    ['motorista','transportadora','placaCavalo','placaCarreta','origem','destino','observacao'].forEach(id=>el(id).value='');
  }
  function switchTab(tab){
    qsa('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
    el('screen-cadastro').classList.toggle('active', tab==='cadastro');
    el('screen-registro').classList.toggle('active', tab==='registro');
  }

  async function addDt(value, sku=''){
    const dt = normalizeDt(value);
    const skuValue = String(sku || '').trim();
    if(!dt) return {ok:false,msg:'Digite uma DT válida.'};
    if(state.dts.some(d=>d.dt===dt)) return {ok:false,msg:`DT ${dt} já cadastrada.`};

    await setDoc(doc(db, 'dts', dt), {
      dt,
      sku: skuValue,
      status:'disponivel',
      createdAt: nowIso(),
      updatedAt: nowIso()
    });
    return {ok:true,msg:`DT ${dt} adicionada.`};
  }

  async function addBulk(text, sku=''){
    const skuValue = String(sku || '').trim();
    const parts = String(text || '').split(/[\s,;\n\r\t]+/).map(normalizeDt).filter(Boolean);
    let added = 0, ignored = 0;
    for(const dt of parts){
      if(state.dts.some(d=>d.dt===dt)){ ignored++; continue; }
      await setDoc(doc(db, 'dts', dt), {
        dt,
        sku: skuValue,
        status:'disponivel',
        createdAt: nowIso(),
        updatedAt: nowIso()
      });
      added++;
    }
    return {added, ignored};
  }

  async function updateDtStatus(dt, status){
    const ref = doc(db, 'dts', dt);
    const snap = await getDoc(ref);
    if(!snap.exists()) throw new Error('DT não encontrada.');
    await updateDoc(ref, { status, updatedAt: nowIso() });
  }

  async function ensureDtAvailable(dt, sku=''){
    const dtNorm = normalizeDt(dt);
    if(!dtNorm) return;
    await setDoc(doc(db, 'dts', dtNorm), {
      dt: dtNorm,
      sku: String(sku || '').trim(),
      status: 'disponivel',
      updatedAt: nowIso(),
      createdAt: nowIso()
    }, { merge: true });
  }

  async function removeDt(dt){
    await deleteDoc(doc(db, 'dts', dt));
  }

  async function register(type='registrado'){
    let dt;
    if(el('dtMode').value === 'manual'){
      dt = el('manualDtSelect').value;
      if(!dt) return toast('Selecione uma DT disponível.');
    } else {
      dt = nextAvailableDt()?.dt;
      if(!dt) return toast('Não há DT disponível.');
    }

    const historyRef = doc(collection(db, 'registros'));
    const dtRef = doc(db, 'dts', dt);

    const payload = {
      id: historyRef.id,
      dt,
      type,
      flowStatus: 'aberto',
      motorista: el('motorista').value.trim(),
      transportadora: el('transportadora').value.trim(),
      placaCavalo: normalizePlate(el('placaCavalo').value),
      placaCarreta: normalizePlate(el('placaCarreta').value),
      origem: el('origem').value.trim(),
      destino: el('destino').value.trim(),
      observacao: el('observacao').value.trim(),
      createdAt: nowIso(),
      updatedAt: nowIso(),
    };

    await runTransaction(db, async (transaction) => {
      const dtSnap = await transaction.get(dtRef);
      if(!dtSnap.exists()) throw new Error('DT não encontrada.');
      const dtData = dtSnap.data();
      if(dtData.status !== 'disponivel') throw new Error('Essa DT não está disponível.');

      transaction.update(dtRef, {
        status: type === 'registrado' ? 'usada' : 'reservada',
        updatedAt: nowIso()
      });

      transaction.set(historyRef, {
        ...payload,
        sku: dtData.sku || ''
      });
    });

    clearRegisterFields();
    toast(`DT ${dt} ${type === 'registrado' ? 'registrada' : 'reservada'} com sucesso.`);
  }

  async function setHistoryStatus(id, newStatus){
    const historyRef = doc(db, 'registros', id);
    await runTransaction(db, async (transaction) => {
      const historySnap = await transaction.get(historyRef);
      if(!historySnap.exists()) throw new Error('Registro não encontrado.');
      const record = historySnap.data();
      if(record.flowStatus !== 'aberto') throw new Error('Esse registro já foi finalizado.');

      transaction.update(historyRef, {
        flowStatus: newStatus,
        updatedAt: nowIso()
      });

      const dtRef = doc(db, 'dts', record.dt);
      if(newStatus === 'concluido'){
        transaction.delete(dtRef);
      } else if(newStatus === 'cancelado'){
        transaction.set(dtRef, {
          dt: record.dt,
          sku: record.sku || '',
          status: 'disponivel',
          updatedAt: nowIso(),
          createdAt: nowIso()
        }, { merge: true });
      }
    });

    toast(newStatus === 'concluido'
      ? 'DT concluída.'
      : 'DT cancelada e devolvida ao cadastro.');
  }

  async function clearByStatus(status){
    const batch = writeBatch(db);
    let count = 0;
    for(const item of state.dts.filter(d => d.status === status)){
      batch.delete(doc(db, 'dts', item.dt));
      count++;
    }
    if(!count) return 0;
    await batch.commit();
    return count;
  }

  async function clearAllData(){
    const dtChunks = [...state.dts];
    const histChunks = [...state.history];
    const groups = [];
    let current = [];

    for(const item of dtChunks){
      current.push({ type: 'dt', id: item.dt });
      if(current.length === 400){ groups.push(current); current = []; }
    }
    for(const item of histChunks){
      current.push({ type: 'hist', id: item.id });
      if(current.length === 400){ groups.push(current); current = []; }
    }
    if(current.length) groups.push(current);

    for(const group of groups){
      const batch = writeBatch(db);
      for(const entry of group){
        if(entry.type === 'dt') batch.delete(doc(db, 'dts', entry.id));
        else batch.delete(doc(db, 'registros', entry.id));
      }
      await batch.commit();
    }
  }

  async function clearHistoryData(){
    const groups = [];
    let current = [];

    for(const item of state.history){
      current.push(item.id);
      if(current.length === 400){ groups.push(current); current = []; }
    }
    if(current.length) groups.push(current);

    for(const group of groups){
      const batch = writeBatch(db);
      for(const id of group){
        batch.delete(doc(db, 'registros', id));
      }
      await batch.commit();
    }
  }

  function exportDtsCsv(){
    const lines = [['DT','SKU','Status','Criada','Atualizada'], ...state.dts.map(r=>[r.dt,r.sku || '',labelDtStatus(r.status),fmtDate(r.createdAt),fmtDate(r.updatedAt)])];
    downloadFile('dts.csv', lines.map(l=>l.map(csvEscape).join(';')).join('\n'), 'text/csv;charset=utf-8');
  }
  function exportHistoryCsv(){
    const lines = [[
      'Tipo','Status','DT','SKU','Motorista','Transportadora','Placa Cavalo','Placa Carreta','Origem','Destino','Observação','Criado em','Atualizado em'
    ], ...state.history.map(r=>[
      labelType(r.type),labelFlowStatus(r.flowStatus),r.dt,r.sku || '',r.motorista,r.transportadora,r.placaCavalo,r.placaCarreta,r.origem,r.destino,r.observacao,fmtDate(r.createdAt),fmtDate(r.updatedAt)
    ])];
    downloadFile('historico_dts.csv', lines.map(l=>l.map(csvEscape).join(';')).join('\n'), 'text/csv;charset=utf-8');
  }
  function backupJson(){
    downloadFile('backup_controle_dts.json', JSON.stringify({
      dts: state.dts,
      history: state.history
    }, null, 2), 'application/json;charset=utf-8');
  }

  async function writeInChunks(items, writer){
    for(let i = 0; i < items.length; i += 350){
      const chunk = items.slice(i, i + 350);
      const batch = writeBatch(db);
      chunk.forEach(item => writer(batch, item));
      await batch.commit();
    }
  }

  async function restoreJson(file){
    const reader = new FileReader();
    reader.onload = async () => {
      try{
        const parsed = JSON.parse(reader.result);
        if(!Array.isArray(parsed.dts) || !Array.isArray(parsed.history)) throw new Error('Formato inválido');
        if(!confirm('Restaurar esse backup e substituir o que está no Firebase?')) return;

        setSyncBadge('warn', 'Restaurando');
        await clearAllData();

        const dtsToWrite = parsed.dts.map(item => ({
          dt: normalizeDt(item.dt),
          sku: String(item.sku || '').trim(),
          status: item.status || 'disponivel',
          createdAt: item.createdAt || nowIso(),
          updatedAt: item.updatedAt || nowIso()
        })).filter(item => item.dt);

        const historyToWrite = parsed.history.map(item => ({
          id: item.id || uid('hist'),
          dt: normalizeDt(item.dt),
          sku: String(item.sku || '').trim(),
          type: item.type || 'registrado',
          flowStatus: item.flowStatus || inferFlowStatus(item),
          motorista: item.motorista || '',
          transportadora: item.transportadora || '',
          placaCavalo: normalizePlate(item.placaCavalo || ''),
          placaCarreta: normalizePlate(item.placaCarreta || ''),
          origem: item.origem || '',
          destino: item.destino || '',
          observacao: item.observacao || '',
          createdAt: item.createdAt || nowIso(),
          updatedAt: item.updatedAt || nowIso()
        })).filter(item => item.dt);

        await writeInChunks(dtsToWrite, (batch, item) => {
          batch.set(doc(db, 'dts', item.dt), item);
        });
        await writeInChunks(historyToWrite, (batch, item) => {
          batch.set(doc(db, 'registros', item.id), item);
        });

        setSyncBadge('ok', 'Online');
        toast('Backup restaurado.');
      }catch(e){
        console.error(e);
        setSyncBadge('err', 'Erro');
        toast('Arquivo inválido.');
      }
    };
    reader.readAsText(file);
  }

  function attachRealtime(){
    if(unsubDts) unsubDts();
    if(unsubHistory) unsubHistory();

    isDtsLoaded = false;
    isHistoryLoaded = false;
    setSyncBadge('warn', 'Sincronizando');

    unsubDts = onSnapshot(collection(db, 'dts'), (snapshot) => {
      state.dts = snapshot.docs.map(docSnap => {
        const data = docSnap.data();
        return {
          dt: data.dt || docSnap.id,
          sku: data.sku || '',
          status: data.status || 'disponivel',
          createdAt: data.createdAt || '',
          updatedAt: data.updatedAt || data.createdAt || ''
        };
      });
      isDtsLoaded = true;
      if(isDtsLoaded && isHistoryLoaded) setSyncBadge('ok', 'Online');
      renderAll();
    }, (error) => {
      console.error(error);
      setSyncBadge('err', 'Erro');
      toast('Erro ao ler DTs do Firebase.');
    });

    unsubHistory = onSnapshot(collection(db, 'registros'), (snapshot) => {
      state.history = snapshot.docs.map(docSnap => {
        const data = docSnap.data();
        return {
          id: data.id || docSnap.id,
          dt: data.dt || '',
          sku: data.sku || '',
          type: data.type || 'registrado',
          flowStatus: data.flowStatus || inferFlowStatus(data),
          motorista: data.motorista || '',
          transportadora: data.transportadora || '',
          placaCavalo: data.placaCavalo || '',
          placaCarreta: data.placaCarreta || '',
          origem: data.origem || '',
          destino: data.destino || '',
          observacao: data.observacao || '',
          createdAt: data.createdAt || '',
          updatedAt: data.updatedAt || data.createdAt || ''
        };
      });
      isHistoryLoaded = true;
      if(isDtsLoaded && isHistoryLoaded) setSyncBadge('ok', 'Online');
      renderAll();
    }, (error) => {
      console.error(error);
      setSyncBadge('err', 'Erro');
      toast('Erro ao ler histórico do Firebase.');
    });
  }

  async function initFirebase(){
    try{
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      setSyncBadge('warn', 'Entrando');

      onAuthStateChanged(auth, (user) => {
        if(user){
          attachRealtime();
        }
      });

      await signInAnonymously(auth);
    }catch(error){
      console.error(error);
      setSyncBadge('err', 'Erro');
      toast('Não foi possível conectar no Firebase. Ative o login anônimo e o Firestore.');
    }
  }

  window.setStatus = async (dt,status) => {
    try{
      await updateDtStatus(dt,status);
    }catch(error){
      console.error(error);
      toast(error.message || 'Erro ao atualizar status.');
    }
  };
  window.deleteDt = async (dt) => {
    if(!confirm(`Excluir DT ${dt}?`)) return;
    try{
      await removeDt(dt);
    }catch(error){
      console.error(error);
      toast('Erro ao excluir DT.');
    }
  };
  window.setHistoryFlowStatus = async (id,status) => {
    try{
      await setHistoryStatus(id,status);
    }catch(error){
      console.error(error);
      toast(error.message || 'Erro ao atualizar status do registro.');
    }
  };

  qsa('.tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
  el('addSingleDtBtn').addEventListener('click', async ()=>{
    try{
      const res = await addDt(el('singleDt').value, el('singleSku').value);
      if(!res.ok) return toast(res.msg);
      el('singleDt').value='';
      el('singleSku').value='';
    }catch(error){
      console.error(error);
      toast(error.message || 'Erro ao adicionar DT.');
    }
  });
  el('clearSingleDtBtn').addEventListener('click', ()=>{
    el('singleDt').value='';
    el('singleSku').value='';
  });
  el('addBulkDtBtn').addEventListener('click', async ()=>{
    try{
      const {added, ignored} = await addBulk(el('bulkDts').value, el('bulkSku').value);
      el('bulkDts').value='';
      el('bulkSku').value='';
      toast(`${added} DT(s) adicionada(s). ${ignored} ignorada(s).`);
    }catch(error){
      console.error(error);
      toast('Erro ao adicionar lote.');
    }
  });
  el('clearBulkBtn').addEventListener('click', ()=>{
    el('bulkDts').value='';
    el('bulkSku').value='';
  });
  el('dtMode').addEventListener('change', manualDtOptions);
  el('manualSelectMode').addEventListener('change', ()=>{
    if(el('manualSelectMode').value !== 'sku') el('manualSkuSelect').value = '';
    manualDtOptions();
  });
  el('manualSkuSelect').addEventListener('change', manualDtOptions);
  el('registerBaldeioBtn').addEventListener('click', async ()=> {
    try{
      await register('registrado');
    }catch(error){
      console.error(error);
      toast(error.message || 'Erro ao registrar.');
    }
  });
  el('reserveNextBtn').addEventListener('click', async ()=> {
    try{
      await register('reservado');
    }catch(error){
      console.error(error);
      toast(error.message || 'Erro ao reservar.');
    }
  });
  ['searchDt','statusFilter','sortMode','historySearch','historyFlowFilter','historySort'].forEach(id => el(id).addEventListener('input', renderAll));
  el('exportDtCsvBtn').addEventListener('click', exportDtsCsv);
  el('exportHistoryCsvBtn').addEventListener('click', exportHistoryCsv);
  el('backupJsonBtn').addEventListener('click', backupJson);
  el('restoreJsonBtn').addEventListener('click', ()=> el('restoreJsonInput').click());
  el('restoreJsonInput').addEventListener('change', (e)=>{
    const file = e.target.files?.[0];
    if(file) restoreJson(file);
    e.target.value='';
  });
  el('clearUsedBtn').addEventListener('click', async ()=>{
    if(!confirm('Excluir todas as DTs registradas?')) return;
    try{
      const count = await clearByStatus('usada');
      if(count === 0) toast('Nenhuma DT registrada para excluir.');
    }catch(error){
      console.error(error);
      toast('Erro ao excluir DTs registradas.');
    }
  });
  el('clearCancelledBtn').addEventListener('click', async ()=>{
    if(!confirm('Excluir todas as DTs canceladas?')) return;
    try{
      const count = await clearByStatus('cancelada');
      if(count === 0) toast('Nenhuma DT cancelada para excluir.');
    }catch(error){
      console.error(error);
      toast('Erro ao excluir DTs canceladas.');
    }
  });
  el('clearAllBtn').addEventListener('click', async ()=>{
    if(!confirm('Limpar todas as DTs e o histórico?')) return;
    try{
      await clearAllData();
    }catch(error){
      console.error(error);
      toast('Erro ao limpar dados.');
    }
  });
  el('clearHistoryBtn').addEventListener('click', async ()=>{
    if(!confirm('Limpar todo o histórico de registros?')) return;
    try{
      await clearHistoryData();
    }catch(error){
      console.error(error);
      toast('Erro ao limpar histórico.');
    }
  });
  ['placaCavalo','placaCarreta'].forEach(id => el(id).addEventListener('input', e => e.target.value = normalizePlate(e.target.value)));

  renderAll();
  initFirebase();
</script>
</body>
